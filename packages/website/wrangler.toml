name = "marktextpro-website"
main = ".open-next/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Enables versioned preview URLs like
# https://pr-NNN-marktextpro-website.<subdomain>.workers.dev which the CI workflow
# parses out of `wrangler versions upload` output and posts back to PRs.
preview_urls = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true
