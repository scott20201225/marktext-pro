name: Bug Report
description: Create a bug report to help us improve MarkTextPro
title: '[Bug] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        **Before reporting:** Search [existing issues](https://github.com/marktextpro/marktextpro/issues) to avoid duplicates. If you find a match, use 👍 instead of opening a new issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Screenshots or error logs to help explain the problem. GIF format is recommended for UI bugs. Not required.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux (AppImage)
        - Linux (Flatpak)
        - Linux (Other)
    validations:
      required: true

  - type: input
    id: marktextpro-version
    attributes:
      label: MarkTextPro Version
      placeholder: 'e.g. 0.17.1'
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: 'e.g. macOS 14.4, Windows 11, Ubuntu 22.04'
    validations:
      required: true

  - type: checkboxes
    id: reproducible
    attributes:
      label: Reproducibility
      options:
        - label: I can reliably reproduce this issue
