name: E2E Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # This is the desktop electron Playwright suite. packages/muya has its
    # own e2e under packages/muya/e2e/ wired via muya-e2e.yml.
    paths-ignore:
      - 'packages/muya/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbfile-dev libsecret-1-dev libfontconfig-dev \
            xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libgtk-3-0 libgbm1 libasound2t64

      - uses: ./.github/actions/setup

      # Run the full postinstall: Electron binary download, patch-package,
      # electron-rebuild, and minify-locales.
      - name: Run postinstall
        run: pnpm tsx scripts/postinstall.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: '0'

      - name: Build app
        run: pnpm build

      - name: Run E2E Tests
        run: xvfb-run --auto-servernum pnpm test:e2e
