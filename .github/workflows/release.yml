name: Release MarkTextPro

# Touch commit to force GitHub Actions to rescan workflows on the fork.

on:
  push:
    # Broad trigger so the validate job can reject malformed v-tags
    # (e.g. `vbad.tag`) instead of them silently not triggering anything.
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing semver tag to package and publish (for example v0.20.0-beta.1)
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release ref
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
    steps:
      - name: Resolve tag and checkout ref
        id: resolve
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_RELEASE_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "checkout_ref=${tag}" >> "${GITHUB_OUTPUT}"

  validate:
    name: Validate tag
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
        run: |
          tag="${RELEASE_TAG}"
          # SemVer 2.0.0 with leading "v"
          if ! [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a valid semver (expected vX.Y.Z[-prerelease][+build])"
            exit 1
          fi
          echo "Tag '$tag' is valid."

  build:
    name: Build (${{ matrix.name }})
    needs:
      - resolve
      - validate
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            platform: linux
            arch: x64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - name: windows-x64
            os: windows-latest
            platform: windows
            arch: x64
          - name: windows-arm64
            os: windows-11-arm
            platform: windows
            arch: arm64
          - name: macos-x64
            os: macos-15-intel
            platform: macos
            arch: x64
          - name: macos-arm64
            os: macos-15
            platform: macos
            arch: arm64

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4.3.1
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Enable Git long paths on Windows
        if: matrix.platform == 'windows'
        shell: bash
        run: git config --global core.longpaths true

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev rpm

      - name: Install Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Setup pnpm + Node + dependencies
        uses: ./.github/actions/setup
        with:
          node-version: '24.14.1'

      # Cache Electron binary; key on package.json so it busts when Electron version changes.
      - name: Cache Electron binary
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ matrix.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            electron-${{ matrix.os }}-

      # Must be set before postinstall runs electron-rebuild
      - name: Set C++20 for MacOS
        if: matrix.platform == 'macos'
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      # Run the full postinstall: Electron binary download, patch-package,
      # electron-rebuild, and minify-locales.
      - name: Run postinstall
        run: pnpm tsx scripts/postinstall.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_user_agent: 'pnpm'
          USE_ELECTRON_CLANG: ${{ matrix.platform == 'linux' && '0' || '' }}

      - name: build-linux
        if: matrix.platform == 'linux'
        run: pnpm run build:linux:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mac builds are unsigned (no Developer ID); see release notes for the
      # user-side xattr/codesign workaround. Per-arch script: electron-builder's
      # --arm64/--x64 flags are additive over the config's arch list, so
      # electron-builder.yml must not pin mac.target arches for the flag to
      # actually restrict the build to a single arch.
      - name: build-mac
        if: matrix.platform == 'macos'
        run: pnpm run build:mac:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: build-win
        if: matrix.platform == 'windows'
        run: pnpm run build:win:${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: marktextpro-${{ matrix.name }}
          retention-days: 7
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.blockmap
            dist/*.yml
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs:
      - resolve
      - build
    runs-on: ubuntu-latest
    # Per-job permissions REPLACE workflow-level ones, so re-declare
    # both: contents:write to publish the release, actions:read for
    # download-artifact's Actions API calls.
    permissions:
      contents: write
      actions: read
    steps:
      - name: Check out workflow sources
        uses: actions/checkout@v4.3.1
        with:
          ref: ${{ github.sha }}

      # upload-artifact@v4 treats `dist/` as the common-ancestor root and
      # stores files flat inside each artifact (no `dist/` prefix). Downloading
      # with `path: dist` + `merge-multiple` recreates `./dist/<file>` across
      # all platforms.
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        working-directory: dist
        run: |
          # Deterministic ordering so identical inputs always produce identical output
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -printf '%f\n' \
            | LC_ALL=C sort \
            | xargs -I{} sha256sum "{}" > SHA256SUMS.txt
          echo "---"
          cat SHA256SUMS.txt

      - name: Compose release notes body
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          IS_PRERELEASE: ${{ contains(needs.resolve.outputs.release_tag, '-') }}
        run: |
          {
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              echo "## ❗ This is a pre-release"
              echo "- May contain bugs and unfinished features."
              echo ""
            fi
            cat .github/release-notes/macos-unsigned-zh-CN.md
            echo
            echo "## Verifying downloads"
            echo "All artifacts are listed with their SHA-256 in \`SHA256SUMS.txt\`. Verify with:"
            echo '```'
            echo 'sha256sum -c SHA256SUMS.txt --ignore-missing'
            echo '```'
          } > release_body.md

      # Immutable-release repos forbid adding assets to an already-published
      # release, and action-gh-release publishes before uploading the assets.
      # Create the release as a draft (assets allowed), then promote it to a
      # published release in the next step.
      - name: Create draft release with assets
        uses: softprops/action-gh-release@v2.6.2
        with:
          draft: true
          prerelease: ${{ contains(needs.resolve.outputs.release_tag, '-') }}
          generate_release_notes: true
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: ${{ needs.resolve.outputs.release_tag }}
          body_path: release_body.md
          fail_on_unmatched_files: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote draft to published release
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${RELEASE_TAG}" --draft=false --repo "${GITHUB_REPOSITORY}"
