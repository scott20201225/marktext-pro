name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # packages/muya (TS v2) self-lints via .github/workflows/muya-lint.yml.
    # Skip the desktop lint+typecheck on muya-only PRs.
    paths-ignore:
      - 'packages/muya/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript typecheck
        run: pnpm typecheck
