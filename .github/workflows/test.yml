name: Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # packages/muya (TS v2) has its own test workflows (muya-test, muya-spec).
    # Skip the desktop unit tests on muya-only PRs.
    paths-ignore:
      - 'packages/muya/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run Unit Tests
        run: pnpm test
